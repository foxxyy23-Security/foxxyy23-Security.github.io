site_name: Bryan Fox | Security
site_url: https://foxxyy23-Security.github.io/
repo_url: https://github.com/foxxyy23-Security/foxxyy23-Security.github.io
repo_name: foxxyy23-Security

theme:
  name: material
  palette: 
    scheme: slate
    primary: teal
    accent: cyan
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Notes:
    - Offensive Security: notes/
    - Engineering: engineering/
  - Certifications: certs.md
